apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-app
  template:
    metadata:
      labels:
        app: sre-app
    spec:
      containers:
      - name: sre-app
        image: python:3.11-slim
        command: ["sh", "-c", "pip install flask prometheus-flask-exporter && python -c \"from flask import Flask; app = Flask(__name__); app.route('/')(lambda: 'SRE App Running!'); app.run(host='0.0.0.0', port=5000)\""]
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: sre-app-service
spec:
  selector:
    app: sre-app
  ports:
  - port: 80
    targetPort: 5000
  type: NodePort